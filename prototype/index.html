<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foobow · 福报</title>
    <meta name="description" id="metaDescription" content="Foobow turns small symbolic kindnesses into a calm daily ritual for your peace of mind." />
    <meta property="og:title" content="Foobow · 福报" />
    <meta property="og:description" content="Gentle good, done gently — a calm daily ritual for your peace of mind." />
    <meta property="og:type" content="website" />
    <link rel="stylesheet" href="landing.css" />
  </head>
  <body>
    <div class="aurora" aria-hidden="true"></div>

    <header class="site-header">
      <a class="brand" href="#top" aria-label="Foobow 福报 home">
        <span class="brand-mark" aria-hidden="true">福</span>
        <span class="brand-word">Foobow<em>· 福报</em></span>
      </a>
      <nav class="site-nav" id="siteNav" aria-label="Sections"></nav>
      <div class="header-actions">
        <div class="lang-switch">
          <label class="visually-hidden" for="langSelect" id="langSwitchLabel">Language</label>
          <select id="langSelect" aria-labelledby="langSwitchLabel"></select>
        </div>
        <a class="btn btn-primary btn-sm" id="headerEnter" href="/app/" data-i18n="enter">Enter Foobow</a>
      </div>
    </header>

    <main id="top">
      <section class="hero">
        <p class="kicker" data-i18n="heroKicker">A virtual good-karma companion</p>
        <h1 class="hero-title" data-i18n="heroTitle">Gather a little light, every day.</h1>
        <p class="couplet" id="coupletTagline">积善德，得福报；种善因，收福果</p>
        <p class="hero-sub" data-i18n="heroSubtitle"></p>

        <div class="hero-orb" aria-hidden="true"><span class="orb"></span></div>

        <blockquote class="phrase-rotator" aria-live="polite">
          <p class="phrase-zh" id="phraseZh"></p>
          <p class="phrase-gloss" id="phraseGloss"></p>
        </blockquote>

        <div class="hero-actions">
          <a class="btn btn-primary" id="enterCta" href="/app/" data-i18n="enter">Enter Foobow</a>
          <a class="btn btn-ghost" href="#gates" data-i18n="learnMore">See how it works</a>
        </div>
      </section>

      <section class="gates" id="gates" aria-labelledby="gatesTitle">
        <p class="section-eyebrow" data-i18n="gatesTitle" id="gatesTitle">Gates of kindness</p>
        <p class="section-sub" data-i18n="gatesSubtitle"></p>
        <div class="gate-grid" id="gateGrid"></div>
      </section>

      <section class="steps" id="how" aria-labelledby="stepsTitle">
        <p class="section-eyebrow" data-i18n="stepsTitle" id="stepsTitle">How it works</p>
        <ol class="step-list" id="stepList"></ol>
      </section>

      <section class="merit" aria-labelledby="meritTitle">
        <div class="merit-inner">
          <p class="section-eyebrow" data-i18n="meritTitle" id="meritTitle">A merit journey</p>
          <p class="merit-body" data-i18n="meritBody"></p>
        </div>
      </section>

      <section class="phrases" id="wisdom" aria-labelledby="phrasesTitle">
        <p class="section-eyebrow" data-i18n="phrasesTitle" id="phrasesTitle">Words to carry with you</p>
        <p class="section-sub" data-i18n="phrasesSubtitle"></p>
        <div class="phrase-wall" id="phraseWall"></div>
      </section>

      <section class="ethics" aria-labelledby="ethicsTitle">
        <div class="ethics-inner">
          <p class="section-eyebrow" data-i18n="ethicsTitle" id="ethicsTitle">Gentle by promise</p>
          <p class="ethics-body" data-i18n="ethicsBody"></p>
        </div>
      </section>

      <section class="final-cta">
        <a class="btn btn-primary btn-lg" href="/app/" data-i18n="enter">Enter Foobow</a>
      </section>
    </main>

    <footer class="site-footer">
      <p class="footer-blessing" data-i18n="footerBlessing"></p>
      <p class="footer-note" data-i18n="footerNote"></p>
    </footer>

    <script src="landing.i18n.js"></script>
    <script src="landing.js"></script>
  </body>
</html>
