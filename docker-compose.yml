services:
  foobow-postgres:
    image: postgres:17-alpine
    container_name: foobow-postgres
    environment:
      POSTGRES_USER: foobow
      POSTGRES_PASSWORD: foobow
      POSTGRES_DB: foobow
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foobow -d foobow"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - foobow-postgres-data:/var/lib/postgresql/data

volumes:
  foobow-postgres-data:
